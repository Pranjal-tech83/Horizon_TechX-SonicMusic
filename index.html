<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SonicFlow — Music Player</title>
  <meta name="description" content="SonicFlow — A beautiful music player with curated playlists and high-fidelity audio." />
  <meta name="author" content="SonicFlow" />
  <meta property="og:title" content="SonicFlow — Music Player" />
  <meta property="og:description" content="Discover, stream, and enjoy music with SonicFlow. High-fidelity audio experience." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════ Top Navigation Bar ══════════════════════════ -->
  <nav class="top-nav">
    <div class="top-nav-brand">SonicFlow</div>
    <div class="top-nav-links">
      <a href="#">Discover</a>
      <a href="#" class="active">Library</a>
      <a href="#">Playlists</a>
      <a href="#">Radio</a>
    </div>
    <div class="top-nav-actions">
      <!-- Bell -->
      <button class="nav-icon-btn" id="btn-notifications" title="Notifications">
        <svg viewBox="0 0 24 24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </button>
      <!-- Settings -->
      <button class="nav-icon-btn" id="btn-settings" title="Settings">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <!-- Avatar -->
      <div class="nav-avatar" title="Profile"></div>
    </div>
  </nav>

  <!-- ══════ Main 3-Column Layout ═══════════════════════ -->
  <div class="app-layout">

    <!-- ── Left Sidebar ──────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>SonicFlow</h2>
        <p>Music Player</p>
      </div>

      <ul class="sidebar-nav">
        <li>
          <button class="sidebar-nav-item" id="nav-home">
            <svg viewBox="0 0 24 24">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Home
          </button>
        </li>
        <li>
          <button class="sidebar-nav-item" id="nav-trending">
            <svg viewBox="0 0 24 24">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            Trending
          </button>
        </li>
        <li>
          <button class="sidebar-nav-item active" id="nav-library">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            Library
          </button>
        </li>
        <li>
          <button class="sidebar-nav-item" id="nav-favorites">
            <svg viewBox="0 0 24 24">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            Favorites
          </button>
        </li>
        <li>
          <button class="sidebar-nav-item" id="nav-recent">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            Recent
          </button>
        </li>
        <li>
          <button class="sidebar-nav-item" id="nav-mymusic">
            <svg viewBox="0 0 24 24">
              <path d="M9 18V5l12-2v13"></path>
              <circle cx="6" cy="18" r="3"></circle>
              <circle cx="18" cy="16" r="3"></circle>
            </svg>
            My Music
          </button>
        </li>
      </ul>

      <button class="add-music-btn" id="btn-add-music-sidebar" title="Add your own music">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Add Your Music
      </button>

      <div class="sidebar-footer">
        <button class="sidebar-footer-item" id="btn-help">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          Help
        </button>
        <button class="sidebar-footer-item" id="btn-logout">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- ── Center Player ─────────────────────────────────── -->
    <main class="center-player">

      <!-- Album Art -->
      <div class="album-art-wrapper" id="album-art-wrapper">
        <img class="album-art" id="album-art" src="https://picsum.photos/seed/sonic1/400/400" alt="Neon Genesis Resonance" />
      </div>

      <!-- Track Info -->
      <div class="track-info-section">
        <div class="track-details">
          <div class="track-title" id="track-title">Neon Genesis Resonance</div>
          <div class="track-artist" id="track-artist">Cybernetic Dreams</div>
        </div>
        <button class="like-btn" id="btn-like" title="Like">
          <svg viewBox="0 0 24 24">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </button>
      </div>

      <!-- Progress Bar -->
      <div class="progress-section">
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time-row">
          <span id="time-elapsed">0:00</span>
          <span id="time-duration">4:05</span>
        </div>
      </div>

      <!-- Playback Controls -->
      <div class="controls-row">
        <!-- Shuffle -->
        <button class="ctrl-btn ctrl-sm" id="btn-shuffle" title="Shuffle">
          <svg viewBox="0 0 24 24">
            <polyline points="16 3 21 3 21 8"></polyline>
            <line x1="4" y1="20" x2="21" y2="3"></line>
            <polyline points="21 16 21 21 16 21"></polyline>
            <line x1="15" y1="15" x2="21" y2="21"></line>
            <line x1="4" y1="4" x2="9" y2="9"></line>
          </svg>
        </button>

        <!-- Previous -->
        <button class="ctrl-btn ctrl-md" id="btn-prev" title="Previous">
          <svg viewBox="0 0 24 24">
            <polygon points="19,20 9,12 19,4" fill="currentColor" stroke="none"></polygon>
            <line x1="5" y1="4" x2="5" y2="20" stroke-width="2.5"></line>
          </svg>
        </button>

        <!-- Play/Pause -->
        <button class="ctrl-btn ctrl-play" id="btn-play" title="Play">
          <svg id="play-icon" viewBox="0 0 24 24">
            <polygon points="5,3 19,12 5,21"></polygon>
          </svg>
        </button>

        <!-- Next -->
        <button class="ctrl-btn ctrl-md" id="btn-next" title="Next">
          <svg viewBox="0 0 24 24">
            <polygon points="5,4 15,12 5,20" fill="currentColor" stroke="none"></polygon>
            <line x1="19" y1="4" x2="19" y2="20" stroke-width="2.5"></line>
          </svg>
        </button>

        <!-- Repeat -->
        <button class="ctrl-btn ctrl-sm" id="btn-repeat" title="Repeat">
          <svg viewBox="0 0 24 24">
            <polyline points="17 1 21 5 17 9"></polyline>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
            <polyline points="7 23 3 19 7 15"></polyline>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
          </svg>
        </button>
      </div>

    </main>

    <!-- ── Right Playlist Panel ──────────────────────────── -->
    <section class="playlist-panel">
      <div class="playlist-header">
        <div class="playlist-header-left">
          <svg viewBox="0 0 24 24">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
          <h2>Top 20 Music</h2>
        </div>
        <div class="playlist-header-right">
          <button class="playlist-add-btn" id="btn-add-music-header" title="Add your own music">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <span class="playlist-badge" id="playlist-badge">20 TRACKS</span>
        </div>
      </div>
      <ul class="playlist-list" id="playlist-list">
        <!-- Rendered by JS -->
      </ul>
    </section>

  </div>

  <!-- Hidden file input for adding user music -->
  <input type="file" id="music-file-input" accept="audio/*" multiple hidden />

  <script src="script.js"></script>

</body>
</html>
